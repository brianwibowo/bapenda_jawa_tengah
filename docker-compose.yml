###############################################
# Docker Compose — Bapenda Jateng (audira.site)
# Services: app (PHP-FPM), db (MySQL), nginx
###############################################

services:
  # -----------------------------------------
  # PHP-FPM Application
  # -----------------------------------------
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bapenda-app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - app-storage:/var/www/html/storage
      - app-public:/var/www/html/public
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    networks:
      - bapenda-network

  # -----------------------------------------
  # MySQL 8.0 Database
  # -----------------------------------------
  db:
    image: mysql:8.0.40
    container_name: bapenda-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db-data:/var/lib/mysql
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "localhost",
          "-u",
          "root",
          "-p${DB_PASSWORD}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - bapenda-network
    # No ports exposed — only accessible within Docker network

    # -----------------------------------------
    # Nginx Reverse Proxy
    # -----------------------------------------
  nginx:
    image: nginx:1.26-alpine
    container_name: bapenda-nginx
    restart: unless-stopped
    ports:
      - "8085:80"
      # Native Nginx handles port 80/443 and proxies here
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - app-public:/var/www/html/public:ro
    depends_on:
      - app
    networks:
      - bapenda-network

# -----------------------------------------
# Persistent Volumes
# -----------------------------------------
volumes:
  db-data:
    driver: local
  app-storage:
    driver: local
  app-public:
    driver: local

# -----------------------------------------
# Internal Network
# -----------------------------------------
networks:
  bapenda-network:
    driver: bridge
