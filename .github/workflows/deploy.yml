# ==================================================
# GitHub Actions — Deploy Bapenda Jateng to VPS
# Triggers on push to main branch
# ==================================================

name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: 203.175.11.198
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script_stop: true
          script: |
            set -e

            PROJECT_DIR="/var/www/audira.site"
            echo "=========================================="
            echo "🚀 Deploying Bapenda Jateng"
            echo "=========================================="

            # Navigate to project directory
            cd "$PROJECT_DIR"

            # Pull latest code
            echo "📥 Pulling latest code from main..."
            git fetch origin main
            git reset --hard origin/main

            # Build and recreate containers
            echo "🔨 Building & restarting containers..."
            docker compose up -d --build

            # Wait a moment for containers to be ready
            sleep 5

            # Run Laravel post-deploy commands inside the container
            echo "⚙️  Running Laravel post-deploy..."
            docker compose exec -T app php artisan migrate --force
            docker compose exec -T app php artisan db:seed --class=CabangSeeder --force
            docker compose exec -T app php artisan config:cache
            docker compose exec -T app php artisan route:cache
            docker compose exec -T app php artisan view:cache
            docker compose exec -T app php artisan storage:link || true
            docker compose exec -T app php artisan event:cache

            # Cleanup old Docker images
            echo "🧹 Cleaning up old images..."
            docker image prune -f

            echo "=========================================="
            echo "✅ Deployment complete!"
            echo "=========================================="
