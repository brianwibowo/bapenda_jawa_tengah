name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            # Pindah ke direktori project di VPS
            cd ${{ secrets.VPS_PROJECT_PATH }}
            
            # (PENTING) Reset semua perubahan lokal di VPS yang mungkin tidak sengaja terjadi (seperti saat error sebelumnya), agar git pull dari github jadi prioritas/bersih
            git fetch origin main
            git reset --hard origin/main
            git clean -df
            
            # Tarik deploy.sh (dan semua file terbaru) terlebih dahulu ke VPS
            git pull origin main
            
            # Beri hak akses agar file bisa dijalankan, kemudian jalankan script-nya
            chmod +x deploy.sh
            bash deploy.sh